<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="stylesheet" href="../../../css/responsive.css">
</head>

<body>
    <section class="auth-section">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-6 d-lg-block d-none">
                    <div class="auth-image-wrapper">
                        <img src="../../../img/auth-illustrations/padlock-spring-illustration.svg" alt="Sign up">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="auth-form-wrapper">
                        <img class="auth-brand-image" src="../../../img/khusa-logos/onekhusa-logo.svg" alt="Sign up">
                        <form action="verify.html">
                            <div class="form-group">
                                <label for="password">Password</label>
                                <div class="form-group-input-wrapper">
                                    <i data-lucide="lock"></i>
                                    <input type="password" class="form-control" id="password"
                                        placeholder="Enter your password" autocomplete="new-password">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <div class="form-group-input-wrapper">
                                    <i data-lucide="lock"></i>
                                    <input type="password" class="form-control" id="confirmPassword"
                                        placeholder="Re-enter your password" autocomplete="new-password">
                                </div>
                            </div>
                            <div class="form-group">
                                <button type="submit" class="button button-primary button-md w-100 mb-3">Next</button>
                                <button type="button" class="button button-md w-100"><i data-lucide="move-left"></i>
                                    Back</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.561.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script src="../../../js/theme-init.js"></script>
    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', function () {
            const input = document.querySelector("#phoneNumber");
            if (input) {
                window.intlTelInput(input, {
                    separateDialCode: true,
                    initialCountry: "mw",
                    geoIpLookup: callback => {
                        fetch('https://ipapi.co/json')
                            .then(response => response.json())
                            .then(data => callback(data.country_code))
                            .catch(() => callback("us"));
                    },
                    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
                });
            }
        });
    </script>

</body>

</html>
